<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Anatomia CSS</title>
    <style>
       .selector{
        color: #fff;
        font-size: 30px;
        text-align: center;
        border: solid navy;
        font-family: 'Courier New', Courier, monospace  ;
        width: calc(100% - 20px);
        background-color: rgb(45, 1, 30);   
    }
/*pseudo classe*/
    .selector:hover {
        background-color: black;
    }

    /*pseudo elemento*/
    .selector::first-letter {
        font-size: 60px;
        font-weight: bold;
    }
    </style>
</head>

<body>
    <div class="selector">Conteúdo</div>
</body>

</html>
