<!-- Formulário -->

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Exemplo de Formulário</h5>
    </div>

    <div class="card-body">
        <form action="" class="container-fluid">
            
            <div class="form-row">
                <div class="col-12">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" class="form-control" id="nome" placeholder="Informe o nome">
                    </div>
                </div>
            </div>
            
            <div class="form-row">
                <div class="col-12">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text">@</span>
                            </div>
                            <input type="email" class="form-control" id="email" placeholder="Informe o Email">
                        </div>
                        <small class="form-text text-muted">Enviaremos um e-mail para confirmar o cadastro.</small>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="col-12">
                    <div class="form-group">
                        <label for="linguagem">Linguagem</label>
                        <select class="form-control" id="linguagem">
                            <option selected>Selecione</option>
                            <option value="1">HTML / CSS</option>
                            <option value="2">JavaScript</option>
                            <option value="3">PHP / Python</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-row mb-3">
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="defaultCheck" checked>
                        <label class="form-check-label" for="defaultCheck">
                            Default checkbox
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="disabledCheck" disabled>
                        <label class="form-check-label text-muted" for="disabledCheck">
                            Disabled checkbox
                        </label>
                    </div>
                </div>
            </div>

            <hr>

            <div class="form-row">
                <div class="col-12 d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary mr-2">Salvar</button>
                    <button type="button" class="btn btn-secondary">Cancelar</button>
                </div>
            </div>

        </form>
    </div>
</div>
